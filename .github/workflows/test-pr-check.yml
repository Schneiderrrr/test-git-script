name: 🧪 Slow Test Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  slow-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate long-running tests
        run: |
          echo "🕒 Starting fake tests..."
          sleep 30
          echo "✅ Fake tests completed after 30 seconds!"
