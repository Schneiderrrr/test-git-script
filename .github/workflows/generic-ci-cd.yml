name: 'Continuous Integration and Deployment'

on:
  push:
    branches:
      - dev
      - pre-demo
      - demo
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

jobs:
  slow-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate long-running tests
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🧬 Workflow was triggered via workflow_dispatch"
            echo "inputs.branch = ${{ inputs.branch }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "🚀 Workflow was triggered by push"
          fi
  
          echo "🕒 Starting fake tests..."
          sleep 10
          echo "✅ Fake tests completed after 30 seconds!"
