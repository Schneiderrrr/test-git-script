name: 'Deploy to pre-demo & demo'

env:
  CURR_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:

jobs:
  # --- Task 0: Search the last CI/CD successful workflow---
  check-previous-workflow:
    name: '0. Ensure generic-ci-cd.yml on dev was successful'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: $CURR_GH_TOKEN

      - name: 'Check latest run of generic-ci-cd.yml on dev'
        id: check-status
        run: |
          echo "Fetching latest 'generic-ci-cd.yml' run on branch 'dev'..."

          RUN_ID=$(gh run list --repo "${{ github.repository }}" --workflow generic-ci-cd.yml --branch dev --limit 1  --json databaseId -q '.[0].databaseId')

          if [ -z "$RUN_ID" ]; then
            echo "No previous workflow run found."
            echo "continue=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          STATUS=$(gh run view "$RUN_ID" --json conclusion -q .conclusion)

          echo "Last run conclusion: $STATUS"

          if [ "$STATUS" == "success" ]; then
            echo "Last run succeeded."
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "Last run did not succeed. Interrupting..."
            echo "continue=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GH_TOKEN: $CURR_GH_TOKEN


  # --- Task 1: Merge from dev to pre-demo ---
  merge-dev-to-pre-demo:
    name: '1. Merge dev -> pre-demo'
    needs: check-previous-workflow
    runs-on: ubuntu-latest

    # Allow pushing, creating PR, calling workflows
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      # Step 1: Check out the repository
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          # We are going to push, so we need to create a full clone
          fetch-depth: 0
          token: $CURR_GH_TOKEN

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Check if PR already exists'
        run: |
          set -e
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base pre-demo --head dev --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            echo "Stopping workflow execution as PR dev -> pre-demo already exists"
            exit 1
          else
            echo "No existing PR found, proceeding with creation"
          fi
        env:
          GH_TOKEN: $CURR_GH_TOKEN

      - name: 'Create PR from dev to pre-demo'
        id: pre-demo-pr
        run: |
          set -e
          gh pr create --base pre-demo --head dev --title "Deploy to pre-demo" --body "Automatically PR from dev to pre-demo"
          PR_NUMBER=$(gh pr list --base pre-demo --head dev --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Created PR number: $PR_NUMBER"
        env:
          GH_TOKEN: $CURR_GH_TOKEN

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.pre-demo-pr.outputs.pr_number }} --merge --admin
        env:
          GH_TOKEN: $CURR_GH_TOKEN

  # --- Task 1.1: Call CI/CD for pre-demo ---
  call-pre-demo-ci-cd:
    needs: merge-dev-to-pre-demo
    uses: ./.github/workflows/generic-ci-cd.yml
    with:
      branch: pre-demo
    secrets: inherit

  # --- Task 2: Merge pre-demo to demo ---
  merge-pre-demo-to-demo:
    name: '2. Merge pre-demo -> demo'
    runs-on: ubuntu-latest

    # Need previous merge from dev to pre-demo was successful
    needs: merge-dev-to-pre-demo

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 'Check out the repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: $CURR_GH_TOKEN

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Fetch all branches to ensure we have the latest pre-demo
          git fetch origin
          git checkout pre-demo
          git pull origin pre-demo

      - name: 'Check if PR already exists'
        run: |
          set -e
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base demo --head pre-demo --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            echo "Stopping workflow execution as PR pre-demo -> demo already exists"
            exit 1
          else
            echo "No existing PR found, proceeding with creation"
          fi
        env:
          GH_TOKEN: $CURR_GH_TOKEN

      - name: 'Create PR from pre-demo to demo'
        id: demo-pr
        run: |
          set -e
          gh pr create --base demo --head pre-demo --title "Deploy to demo" --body "Automatically PR from pre-demo to demo"
          PR_NUMBER=$(gh pr list --base demo --head pre-demo --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: $CURR_GH_TOKEN

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.demo-pr.outputs.pr_number }} --merge --admin
        env:
          GH_TOKEN: $CURR_GH_TOKEN

  # --- Task 2.1: Call CI/CD for demo ---
  call-demo-ci-cd:
    needs: merge-pre-demo-to-demo
    uses: ./.github/workflows/generic-ci-cd.yml
    with:
      branch: demo
    secrets: inherit

