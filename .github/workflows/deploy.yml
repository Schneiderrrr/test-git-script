name: 'Deploy to pre-demo & demo'

on:
  workflow_dispatch:

jobs:
  # --- Task 1: Merge from dev to pre-demo ---
  merge-dev-to-pre-demo:
    name: '1. Merge dev -> pre-demo'
    runs-on: ubuntu-latest

    # Allow pushing
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      # Step 1: Check out the repository
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          # We are going to push, so we need to create a full clone
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Check if PR already exists'
        run: |
          set -e
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base pre-demo --head dev --state open --json number --jq '.[0].number // empty')
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            echo "Stopping workflow execution as PR dev -> pre-demo already exists"
            exit 1
          else
            echo "No existing PR found, proceeding with creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Create PR from dev to pre-demo'
        id: pre-demo-pr
        run: |
          set -e
          gh pr create --base pre-demo --head dev --title "Opening PR dev to pre-demo" --body "PR dev to pre-demo"
          PR_NUMBER=$(gh pr list --base pre-demo --head dev --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Created PR number: $PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Wait for CI/CD workflow triggered by this PR'
        run: |
          PR_NUMBER="${{ steps.pre-demo-pr.outputs.pr_number }}"
          echo "Waiting for 'Continuous Integration and Deployment' workflow triggered by PR #$PR_NUMBER..."
          
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: PR number is empty"
            exit 1
          fi
          
          TIMEOUT=1800 # 30 minutes
          INTERVAL=10  # 10 seconds between checks
          ELAPSED=0
          
          # Get PR creation time as reference
          PR_CREATED_TIME=$(gh pr view $PR_NUMBER --json createdAt -q .createdAt)
          echo "PR was created at: $PR_CREATED_TIME"
          
          # Find the workflow ID by filename (looking for ci-cd.yml or similar)
          echo "Finding CI/CD workflow by filename..."
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows --jq '.workflows[] | select(.path | endswith("generic-ci-cd.yml")) | .id' | head -1)
          
          if [ -z "$WORKFLOW_ID" ]; then
            echo "Could not find CI/CD workflow by common filenames"
            echo "Available workflows:"
            gh api repos/${{ github.repository }}/actions/workflows --jq '.workflows[] | "Name: \(.name), File: \(.path), ID: \(.id)"'
            echo "Please specify the exact filename in the script"
            exit 1
          fi
          
          echo "Found workflow ID: $WORKFLOW_ID"
          
          # Wait for workflow to initialize
          echo "Waiting 15 seconds for CI/CD workflow to initialize..."
          sleep 15
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Get all workflow runs for our specific workflow
            # that were started after PR creation
            WORKFLOW_RUNS=$(gh api repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs \
              --jq '.workflow_runs[] | select(.created_at >= "'"$PR_CREATED_TIME"'")')
            
            if [ -z "$WORKFLOW_RUNS" ]; then
              echo "No CI/CD workflow runs found after PR creation, waiting..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi
            
            # Find workflow run that was triggered for our PR
            # Use --argjson to properly pass the PR number
            RELEVANT_RUN=$(echo "$WORKFLOW_RUNS" | jq --argjson pr_num "$PR_NUMBER" -s '.[] | select(.pull_requests != null and (.pull_requests[] | .number == $pr_num))')
            
            if [ -z "$RELEVANT_RUN" ]; then
              echo "No CI/CD workflow run found for PR #$PR_NUMBER, waiting..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi
            
            # Get status and conclusion
            STATUS=$(echo "$RELEVANT_RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RELEVANT_RUN" | jq -r '.conclusion // "null"')
            RUN_ID=$(echo "$RELEVANT_RUN" | jq -r '.id')
            CREATED_AT=$(echo "$RELEVANT_RUN" | jq -r '.created_at')
            
            echo "Found CI/CD workflow run #$RUN_ID for PR #$PR_NUMBER"
            echo "Status: $STATUS, Conclusion: $CONCLUSION (created: $CREATED_AT)"
            
            # If workflow is completed
            if [ "$STATUS" = "completed" ]; then
              echo "CI/CD workflow completed with conclusion: $CONCLUSION"
              echo "Proceeding with merge..."
              break
            fi
            
            echo "Waiting for CI/CD workflow to complete..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timeout waiting for CI/CD workflow to complete."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.pre-demo-pr.outputs.pr_number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Task 2: Merge pre-demo to demo ---
  merge-pre-demo-to-demo:
    name: '2. Merge pre-demo -> demo'
    runs-on: ubuntu-latest

    # Need previous task was successful
    needs: merge-dev-to-pre-demo

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 'Check out the repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Fetch all branches to ensure we have the latest pre-demo
          git fetch origin
          git checkout pre-demo
          git pull origin pre-demo

      - name: 'Check if PR already exists'
        run: |
          set -e
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base demo --head pre-demo --state open --json number --jq '.[0].number // empty')
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            echo "Stopping workflow execution as PR pre-demo -> demo already exists"
            exit 1
          else
            echo "No existing PR found, proceeding with creation"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Create PR from pre-demo to demo'
        id: demo-pr
        run: |
          set -e
          gh pr create --base demo --head pre-demo --title "Deploy pre-demo to demo" --body "PR from pre-demo to demo"
          PR_NUMBER=$(gh pr list --base demo --head pre-demo --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.demo-pr.outputs.pr_number }} --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}