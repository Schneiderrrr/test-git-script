name: 'Deploy to pre-demo & demo'


on:
  workflow_dispatch:

jobs:
  # --- Task 1: Merge from dev to pre-demo ---
  merge-dev-to-pre-demo:
    name: '1. Merge dev -> pre-demo'
    runs-on: ubuntu-latest

    # Allow pushing
    permissions:
      contents: write

    steps:
      # Step 1: Check out the repository
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          # We are going to push, so we need to create a full clone
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Create PR from dev to pre-demo'
        id: pre-demo-pr
        run: |
          set -e
          gh pr create --base pre-demo --head dev --title "Opening PR dev to pre-demo"
          PR_NUMBER=$(gh pr list --base pre-demo --head dev --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: 'Get PR SHA'
        id: pr-sha
        run: |
          PR_SHA=$(gh pr view ${{ steps.pre-demo-pr.outputs.pr_number }} --json headRefOid -q .headRefOid)
          echo "sha=$PR_SHA" >> $GITHUB_OUTPUT

      - name: 'Wait for checks to complete'
        uses: WyriHaximus/github-action-wait-for-status@v1
        with:
          sha: ${{ steps.pr-sha.outputs.sha }}
          checkInterval: '30'
          ignoreActions: ''

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.pre-demo-pr.outputs.pr_number }} --no-ff --no-edit --merge --admin

  # --- Task 2: Merge pre-demo to demo ---
  merge-pre-demo-to-demo:
    name: '2. Merge pre-demo -> demo'
    runs-on: ubuntu-latest

    # Need previous task was successful
    needs: merge-dev-to-pre-demo

    permissions:
      contents: write

    steps:
      - name: 'Check out the repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Git adjustments'
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Create PR from pre-demo to demo'
        id: demo-pr
        run: |
          set -e
          gh pr create --base demo --head pre-demo --title "Opening PR pre-demo to demo"
          PR_NUMBER=$(gh pr list --base demo --head pre-demo --state open --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: 'Merge PR'
        run: |
          gh pr merge ${{ steps.demo-pr.outputs.pr_number }} --merge --admin --no-ff --no-edit